name: Android Qt 6

on:
  push:
    paths-ignore:
    - scripts/docker/**
    branches:
    - master
  pull_request:
    paths-ignore:
    - scripts/docker/**
    branches:
    - master
  workflow_dispatch:

env:
  RELEASE_PUBLISHER: "true"

jobs:
  build:
    outputs:
      release_tag: v${{ steps.version_number.outputs.version }}
    env:
      KEYSTORE_FILE: ${{ github.workspace }}/../subsurface.keystore
      QT_ARCH: 'android_arm64_v8a'
      ANDROID_BUILD_ABI: 'arm64-v8a'
      BUILDROOT: '/android'
    runs-on: ubuntu-24.04
    # the container version is created in android-dockerimage.yml and is based
    # on the Qt version plus a running count of container builds for that version
    container:
      image: subsurface/android-build:6.10.3-1

    steps:
    - name: checkout sources
      uses: actions/checkout@v6
      with:
        fetch-depth: 0
        submodules: recursive

    - name: create links to sync standalone and GitHub filesystem
      run: |
        ln -s "$GITHUB_WORKSPACE" ${BUILDROOT}/src/subsurface

    - name: set the version information
      id: version_number
      uses: ./.github/actions/manage-version
      with:
        nightly-builds-secret: ${{ secrets.NIGHTLY_BUILDS }}

    - name: set up the keystore
      if: github.event_name == 'push'
      env:
        ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
      run: |
        echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > $KEYSTORE_FILE

    - name: build Subsurface-mobile
      env:
        BUILDNR: ${{ steps.version_number.outputs.buildnr }}
        VERSION: ${{ steps.version_number.outputs.version }}
        VERSION_4: ${{ steps.version_number.outputs.version_4 }}
      run: |
        mkdir -p build-android
        ln -s $(pwd)/build-android ${BUILDROOT}/build-android
        bash -x ${GITHUB_WORKSPACE}/scripts/docker/android-build-container/android-build-subsurface.sh

    - name: collect APK
      env:
        VERSION: ${{ steps.version_number.outputs.version }}
      run: |
        APK=$(find build-android/android-build -name "*.apk" | head -1)
        cp "${APK}" "${GITHUB_WORKSPACE}/Subsurface-mobile-${VERSION}.apk"

    - name: build AAB  # just to validate that that build isn't broken
      env:
        VERSION: ${{ steps.version_number.outputs.version }}
      run: |
        cd build-android/android-build
        ./gradlew bundleRelease

        AAB=$(find . -name "*.aab" | head -1)
        cp "${AAB}" "${GITHUB_WORKSPACE}/Subsurface-mobile-${VERSION}.aab"

    - name: sign APK
      if: github.event_name == 'push'
      env:
        VERSION: ${{ steps.version_number.outputs.version }}
      run: |
        APK="${GITHUB_WORKSPACE}/Subsurface-mobile-${VERSION}.apk"
        ALIGNED="${GITHUB_WORKSPACE}/Subsurface-mobile-${VERSION}-aligned.apk"
        SIGNED="${GITHUB_WORKSPACE}/Subsurface-mobile-${VERSION}-signed.apk"

        ${ANDROID_SDK_ROOT}/build-tools/${SDK_VERSION}/zipalign -P 16 4 "${APK}" "${ALIGNED}"
        ${ANDROID_SDK_ROOT}/build-tools/${SDK_VERSION}/apksigner sign \
          --ks "${KEYSTORE_FILE}" \
          --ks-pass "pass:${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" \
          --ks-key-alias "${{ secrets.ANDROID_KEYSTORE_ALIAS }}" \
          --in "${ALIGNED}" \
          --out "${SIGNED}"

        mv "${SIGNED}" "${APK}"
        rm -f "${ALIGNED}"

    - name: delete the keystore
      if: github.event_name == 'push'
      run: |
        rm -f $KEYSTORE_FILE

    - name: publish pull request artifacts
      if: github.event_name == 'pull_request'
      uses: actions/upload-artifact@v7
      with:
        name: Subsurface-Android-${{ steps.version_number.outputs.version }}
        path: |
          Subsurface-mobile-*.apk

    # only publish a 'release' on push events (those include merging a PR)
    - name: upload binaries
      if: github.event_name == 'push'
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v${{ steps.version_number.outputs.version }}
        repository:  ${{ github.repository_owner }}/nightly-builds
        token: ${{ secrets.NIGHTLY_BUILDS }}
        draft: true
        prerelease: false
        fail_on_unmatched_files: true
        files: |
          Subsurface-mobile-${{ steps.version_number.outputs.version }}.apk

  notify-release-coordinator:
    if: always()
    needs: build
    uses: ./.github/workflows/notify-release-coordinator.yml
    with:
      release_tag: ${{ needs.build.outputs.release_tag }}
      conclusion: ${{ needs.build.result }}
